on:
  push: 
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Checkout code
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      -
        name: Build & Push - PHP8.2 Base Image
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base
          push: true
          tags: thekingscode/php8.2-base:latest
          sbom: true
          provenance: true

      -
        name: Build & Push - PHP8.2 Base Prod
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base
          push: true
          tags: thekingscode/php8.2-cli:latest
          sbom: true
          provenance: true
          build-args: |
            "IMAGICK=true"
            "CLI=false"

      -
        name: Build & Push - PHP8.2 Base Prod CLI
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base
          push: true
          tags: thekingscode/php8.2-cli:latest
          sbom: true
          provenance: true
          build-args: |
            "IMAGICK=true"
            "CLI=true"

      -
        name: Build & Push - PHP8.2 Base MONGO Image
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base
          push: true
          tags: thekingscode/php8.2-base:latest
          sbom: true
          provenance: true
          build-args: |
            "IMAGICK=true"
            "MONGO=true"

      -
        name: Build & Push - PHP8.2 Base MONGO Prod
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base
          push: true
          tags: thekingscode/php8.2-cli:latest
          sbom: true
          provenance: true
          build-args: |
            "IMAGICK=true"
            "MONGO=true"

      -
        name: Build & Push - PHP8.2 Base MONGO Prod CLI
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base
          push: true
          tags: thekingscode/php8.2-cli:latest
          sbom: true
          provenance: true
          build-args: |
            "IMAGICK=true"
            "MONGO=true"  
            "CLI=true"

      -
        name: Build & Push - PHP8.2 Base DEV Image
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base
          push: true
          tags: thekingscode/php8.2-dev:latest
          sbom: true
          provenance: true
          build-args: |
            "DEVELOPMENT=true"
            "IMAGICK=true"

      -
        name: Build & Push - PHP8.2 Base MONGO DEV Image
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base
          push: true
          tags: thekingscode/php8.2-dev-mongo:latest
          sbom: true
          provenance: true
          build-args: |
            "DEVELOPMENT=true"
            "IMAGICK=true"
            "MONGO=true"