on:
  push: 
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Checkout code
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      -
        name: Build & Push - PHP8.2 Base Image
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base
          push: true
          tags: thekingscode/php8.2-base:latest
          sbom: true
          provenance: true

      -
        name: Build & Push - PHP8.2 Base Apache Image
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2/base-apache
          push: true
          tags: thekingscode/php8.2-base-apache:latest
          sbom: true
          provenance: true