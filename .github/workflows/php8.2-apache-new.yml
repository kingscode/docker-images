on:
  push: 
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Checkout code
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull PHP 8.2 Image
        run: |
          echo "Pulling PHP 8.2 image..."
          docker pull php:8.2

      - name: Get Digest of Pulled PHP 8.2 Image
        id: digest
        run: |
          # Get the digest of the php:8.2 image
          echo "Getting the digest of the php:8.2 image..."
          LATEST_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' php:8.2 | cut -d'@' -f 2)
          if [ -z "$LATEST_DIGEST" ]; then
            echo "Error: Failed to retrieve the digest."
            exit 1
          fi
          echo "latest_digest=$LATEST_DIGEST" >> $GITHUB_OUTPUT

      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./php8.2-apache-new
          push: true
          tags: thekingscode/php8.2-apache-new:latest
          sbom: true
          provenance: true
          build-args: |
            "PHP_DIGEST=${{ steps.digest.outputs.latest_digest }}"