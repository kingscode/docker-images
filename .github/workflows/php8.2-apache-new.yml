on:
  push: 
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Checkout code
        uses: actions/checkout@v3
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Pull Latest Image and Get Digest
        id: digest
        run: |
          # Use the Docker Registry API to fetch the digest
          RESPONSE=$(curl -sSL "https://registry.hub.docker.com/v2/repositories/library/php/tags/8.2.25-apache")

          # Extract the digest from the JSON response
          DIGEST=$(echo "$RESPONSE" | jq -r '.images[0].digest')

          # Output the digest
          echo "Latest Digest: $digest"
          echo "::set-output name=digest::$digest"

      -
        name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: ./php8.2-apache-new
          push: true
          tags: thekingscode/php8.2-apache-new:latest
          sbom: true
          provenance: true
          build-args: |
            "PHP_DIGEST=${{ steps.digest.outputs.digest }}"